name: CreditCard
description: 測試用信用卡資訊
fields:
  - name: card_number
    type: string
    required: true
    description: 信用卡卡號，部分遮罩以 * 表示
  - name: card_type
    type: string
    required: false
    description: 卡別，例如未知卡、美國運通
  - name: category
    type: string
    required: false
    description: 適用類別，例如 Lab、正式區
  - name: notes
    type: string
    required: false
    description: 額外備註，例如可否分期、卡號位數
  - name: source_page
    type: integer
    required: false
    description: 資料來源頁碼
example:
  card_number: "558888000000004"
  card_type: ""
  category: Lab
  notes: 不能分期
  source_page: 1
