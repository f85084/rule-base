name: Invoice
description: 發票測試資料
fields:
  - name: invoice_type
    type: string
    required: true
    description: 發票類型，例如手機載具、自然人憑證、統一編號
  - name: value
    type: string
    required: true
    description: 發票載具號碼或統編
  - name: description
    type: string
    required: false
    description: 額外說明
  - name: source_page
    type: integer
    required: false
    description: 資料來源頁碼
example:
  invoice_type: 手機載具
  value: /68CKDSR
  description: ""
  source_page: 3
