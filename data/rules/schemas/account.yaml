name: Account
description: 系統測試帳號，包含員編、角色與密碼
fields:
  - name: username
    type: string
    required: true
    description: 登入帳號
  - name: employee_id
    type: string
    required: false
    description: 員工編號
  - name: account_type
    type: string
    required: false
    description: 帳號類型，例如 user、b2b
  - name: role
    type: string
    required: true
    description: 角色權限，例如系統分派之組長、專員組長、質檢小組成員
  - name: password
    type: string
    required: true
    sensitive: true
    description: 登入密碼
  - name: environment
    type: string
    required: false
    description: 適用環境，例如 Lab、正式區
  - name: source_page
    type: integer
    required: false
    description: 資料來源頁碼
example:
  username: qatest1
  employee_id: "382545"
  account_type: user
  role: 系統分派之組長
  password: "1"
  environment: Lab
  source_page: 1
