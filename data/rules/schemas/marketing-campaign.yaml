name: MarketingCampaign
description: 行銷活動與折扣規則
fields:
  - name: campaign_name
    type: string
    required: true
    description: 活動名稱
  - name: product_id
    type: string
    required: false
    description: 綁定商品編號
  - name: common_id
    type: string
    required: false
    description: 共同商品或活動代碼
  - name: condition
    type: string
    required: true
    description: 折扣條件，例如全部享折扣、第1享折扣、大於或等於2享折扣
  - name: discount
    type: string
    required: false
    description: 折扣內容，例如折200、折10%、折100
  - name: channel
    type: string
    required: false
    description: 適用通路，例如 ob通路、網路通路、所有通路
  - name: source_page
    type: integer
    required: false
    description: 資料來源頁碼
example:
  campaign_name: ob通路_折200
  product_id: "841172607"
  common_id: "47771549"
  condition: 全部享折扣
  discount: 折200
  channel: ob通路
  source_page: 2
