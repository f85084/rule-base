name: PhoneNumber
description: 軟體電話、測試號碼與 SIP 分機
fields:
  - name: number
    type: string
    required: true
    description: 電話號碼或分機
  - name: type
    type: string
    required: true
    description: 類型，例如軟體電話、sip、Avaya、VDN
  - name: description
    type: string
    required: false
    description: 用途說明
  - name: source_page
    type: integer
    required: false
    description: 資料來源頁碼
example:
  number: "02-8023-9368"
  type: 軟體電話
  description: 舊 Lab 軟體電話
  source_page: 4
