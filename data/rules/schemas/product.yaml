name: Product
description: 測試用商品資料，包含商品限制與配送條件
fields:
  - name: product_id
    type: string
    required: true
    description: 商品編號
  - name: product_name
    type: string
    required: false
    description: 商品名稱
  - name: description
    type: string
    required: true
    description: 商品用途與限制說明
  - name: restrictions
    type: array_of_string
    required: false
    description: 限制條件，例如不能海外配送、不能變價、只可貨到付款
  - name: source_page
    type: integer
    required: false
    description: 資料來源頁碼
example:
  product_id: "1175324"
  product_name: 壓力測試--庫送商品
  description: 庫送商品
  restrictions:
    - 不能海外配送
  source_page: 2
