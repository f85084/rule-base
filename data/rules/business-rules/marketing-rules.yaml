domain_entity: marketing-campaign
description: 行銷活動、折扣與通關密語規則
rules:
  - id: MKT-001
    name: 通關密語 22 折扣條件
    description: |
      通關密語 22 適用於大通路，但商品 1130690 被排除。
      需滿足：商品為 218344、子通路為電視、商品金額大於 890、小分類非票券餐券住宿券，方可折百。
    condition:
      operator: and
      clauses:
        - field: passcode
          operator: equals
          value: "22"
        - field: product_id
          operator: equals
          value: "218344"
        - field: sub_channel
          operator: equals
          value: 電視
        - field: product_amount
          operator: greater_than
          value: 890
        - field: sub_category
          operator: not_in
          values:
            - 票券
            - 餐券
            - 住宿券
        - field: excluded_product_id
          operator: not_in
          values:
            - "1130690"
    action:
      type: discount
      discount_value: 100
      message: 符合通關密語條件，折百
    sample_references:
      - data/samples/passcodes.yaml

  - id: MKT-002
    name: 網路通路第1件折扣
    description: 網路通路活動中，第 1 件商品享折扣
    condition:
      operator: and
      clauses:
        - field: channel
          operator: equals
          value: 網路通路
        - field: item_index
          operator: equals
          value: 1
    action:
      type: discount
      discount_value: 100
      message: 網路通路第1件折100
    sample_references:
      - data/samples/marketing-campaigns.yaml

  - id: MKT-003
    name: ob通路滿件折扣
    description: ob 通路依購買件數給予不同折扣，第2件折10、滿4件折20
    condition:
      operator: and
      clauses:
        - field: channel
          operator: equals
          value: ob通路
        - field: item_count
          operator: greater_than_or_equal
          value: 2
    action:
      type: discount_by_tier
      tiers:
        - threshold: 2
          discount: 10
        - threshold: 4
          discount: 20
      message: ob通路滿件折扣
    sample_references:
      - data/samples/marketing-campaigns.yaml
